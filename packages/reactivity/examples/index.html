<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app"></div>
    <script src="../dist/reactivity.global.js"></script>
    <script>
      const { reactive, effect } = VueReactivity;
      let obj = { name: 'hzg', age: 17 };
      const state = reactive(obj);

      // console.log("state", state)

      // 1.effect会默认执行一次
      const run = effect(() => {
        console.log('ok')
        app.innerHTML = state.name + '今年' + state.age + '岁' + state.age;
      });
      

      setTimeout(() => {
        // 数据更新后会刷新一次。
        state.age = 20;
        run.effect.stop()
      }, 3000);
      setTimeout(() => {
        // 数据更新后会刷新一次。
        state.age = 30;
      }, 6000);
    </script>
  </body>
</html>
